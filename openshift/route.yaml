apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: meta-chapter-manager
  labels:
    app: meta-chapter-manager
spec:
  # Set host if you have a fixed hostname, otherwise OpenShift auto-generates one:
  # host: mcm.apps.your-cluster.example.com
  to:
    kind: Service
    name: meta-chapter-manager
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
