apiVersion: v1
kind: Secret
metadata:
  name: meta-chapter-manager
  labels:
    app: meta-chapter-manager
type: Opaque
stringData:
  # Required – generate with: openssl rand -base64 48
  JWT_SECRET: "CHANGE_ME_strong_random_secret"

  # Optional – only needed when GIT_DB_URL points to an HTTP(S) remote
  GIT_DB_USER: ""
  GIT_DB_PASSWORD: ""
