<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCM – Login</title>
  <script src="/vendor/tailwindcss-browser.js"></script>
  <script src="/store.js"></script>
  <script src="/branding.js"></script>
  <script src="/branding.custom.js" onerror="void 0"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">
  <div id="app" class="w-full max-w-sm" style="-webkit-font-smoothing:antialiased">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl shadow-lg shadow-blue-500/20 mb-4">
        <span class="text-white text-xl font-black tracking-tight">{{ branding.logoText }}</span>
      </div>
      <h1 class="text-white text-xl font-bold tracking-tight">{{ branding.appName }}</h1>
      <p class="text-slate-400 text-sm mt-1">{{ orgName }}</p>
    </div>

    <!-- Demo banner -->
    <div v-if="demoMode" class="mb-4 px-4 py-3 rounded-xl bg-amber-400/15 border border-amber-400/40 text-amber-200 text-[13px] text-center">
      <span class="font-semibold">Demo-Modus</span> · Kürzel <code class="font-mono bg-amber-400/20 px-1 rounded">admin</code> · Passwort <code class="font-mono bg-amber-400/20 px-1 rounded">admin</code>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl shadow-black/20 p-7">
      <h2 class="text-gray-800 font-semibold text-base mb-5">Anmelden</h2>

      <form @submit.prevent="login">
        <div class="mb-4">
          <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Kürzel</label>
          <input
            v-model="form.kuerzel"
            type="text"
            placeholder="z.B. s888"
            autocomplete="username"
            class="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-400 transition-all"
            required
          />
        </div>

        <div class="mb-5">
          <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Passwort</label>
          <input
            v-model="form.password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            pattern="^\S.*\S$|^\S$"
            title="Kein Leerzeichen am Anfang oder Ende"
            class="w-full px-3.5 py-2.5 border border-slate-200 rounded-lg text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-400 transition-all"
            required
          />
        </div>

        <div v-if="error" class="mb-4 px-3.5 py-2.5 bg-red-50 border border-red-200 rounded-lg text-red-700 text-[13px]">
          {{ error }}
        </div>

        <button
          type="submit"
          :disabled="loading"
          class="w-full py-2.5 bg-gradient-to-b from-blue-500 to-blue-700 text-white font-semibold text-sm rounded-lg hover:from-blue-600 hover:to-blue-800 disabled:opacity-50 transition-all shadow-sm shadow-blue-600/25 hover:shadow-blue-600/35 active:translate-y-px"
        >
          <span v-if="loading">Anmelden …</span>
          <span v-else>Anmelden</span>
        </button>
      </form>

      <p class="text-center text-slate-400 text-[11px] mt-5">
        Noch kein Konto?
        <a href="/register.html" class="text-blue-600 hover:underline font-medium">Registrierung beantragen</a>
      </p>
    </div>

    <p class="text-center text-slate-500 text-[11px] mt-6">{{ branding.copyright }}<span v-if="version" class="ml-2 text-slate-600">v{{ version }}</span></p>
  </div>

  <script src="/vendor/vue.global.prod.js"></script>
  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        const form = reactive({ kuerzel: '', password: '' });
        const error = ref('');
        const loading = ref(false);
        const demoMode = ref(false);
        const orgName = ref(window.APP_BRANDING.orgName);
        const version = ref('');

        const rawRedirect = new URLSearchParams(window.location.search).get('redirect') || '/app';
        // Prevent open redirect — only allow paths starting with /
        const redirectTo = rawRedirect.startsWith('/') ? rawRedirect : '/app';

        onMounted(async () => {
          if (MCM_STORE.get('token')) {
            window.location.href = redirectTo;
            return;
          }
          try {
            const st = await fetch('/api/status').then(r => r.json());
            if (st.demoMode) demoMode.value = true;
            if (st.orgName)  orgName.value  = st.orgName;
            if (st.version)  version.value  = st.version;
          } catch { /* server may not be ready */ }
        });

        async function login() {
          error.value = '';
          form.kuerzel = form.kuerzel.trim().toLowerCase();
          loading.value = true;
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ kuerzel: form.kuerzel, password: form.password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Anmeldung fehlgeschlagen');
            MCM_STORE.login(data.kuerzel, data.token, {
              kuerzel: data.kuerzel,
              name: data.name,
              vorname: data.vorname,
              roles: data.roles,
              orgaAdmin: data.orgaAdmin || false,
              zeitstelle: data.zeitstelle || false
            }, data.mustChangePassword);
            if (data.mustChangePassword) {
              window.location.href = redirectTo;
            } else {
              window.location.href = redirectTo;
            }
          } catch (e) {
            error.value = e.message;
          } finally {
            loading.value = false;
          }
        }

        return { form, error, loading, login, branding: window.APP_BRANDING, demoMode, orgName, version };
      }
    }).mount('#app');
  </script>
</body>
</html>
