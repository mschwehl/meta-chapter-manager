<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaChapterManager</title>
  <script src="/vendor/tailwindcss-browser.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-sidebar: #1a1d23;
      --color-sidebar-hover: #2a2d35;
      --color-sidebar-active: #2563eb;
      --color-topbar: #0c0e13;
    }
  </style>
  <script src="/branding.js"></script>
  <script src="/branding.custom.js" onerror="void 0"></script>
  <script src="/i18n.js"></script>
  <style>
    [v-cloak] { display: none; }
    .fade-enter-active, .fade-leave-active { transition: opacity .18s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,.35); border-radius: 9px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,.55); }
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    ::selection { background: rgba(59,130,246,.25); }
  </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
<div id="app" v-cloak class="flex h-screen">

  <!-- ═══════════════ MAIN AREA ══════════════════════════════════ -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- ─── Top Bar ─── -->
    <header class="h-[3.25rem] bg-topbar flex items-center justify-between px-3 sm:px-5 shrink-0 relative z-30"
      style="box-shadow:0 1px 0 rgba(255,255,255,.04), 0 1px 3px rgba(0,0,0,.35)">

      <!-- Left cluster -->
      <div class="flex items-center gap-1.5 sm:gap-2.5 min-w-0 flex-1">
        <!-- Brand -->
        <button @click="mod = 'ctx'; ctx = null; window.history.pushState(null, '', '/app')"
          class="flex items-center gap-2 shrink-0 group focus:outline-none transition-all"
          title="Zur Rollenauswahl">
          <div class="w-7 h-7 rounded-[8px] bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white text-[10px] font-black leading-none select-none shadow-sm shadow-blue-500/20 group-hover:shadow-blue-500/40 group-hover:scale-105 transition-all">
            {{ (branding.logoText || 'APP').slice(0,3) }}
          </div>
          <span class="text-gray-300 text-[13px] font-medium hidden lg:inline tracking-tight group-hover:text-white transition-colors">{{ branding.orgName }}</span>
        </button>

        <!-- Divider -->
        <div v-if="ctx" class="w-px h-5 bg-white/15 hidden sm:block"></div>

        <!-- Context badge -->
        <div v-if="ctx" class="flex items-center gap-2 shrink-0">
          <div class="hidden sm:flex items-center gap-2 px-2 py-1 rounded-lg bg-white/10 border border-white/10">
            <span class="text-sm leading-none">{{ ctx.icon }}</span>
            <div class="flex items-baseline gap-1.5">
              <span v-if="ctx.detail" class="text-white font-semibold text-[12px] leading-none">{{ ctx.detail }}</span>
              <span :class="ctx.detail ? 'text-[11px] text-gray-400' : 'text-gray-200 font-medium text-[12px]'" class="leading-none uppercase tracking-wider">{{ ctx.role || ctx.label }}</span>
            </div>
          </div>
          <span v-if="ctx" class="sm:hidden text-lg leading-none">{{ ctx.icon }}</span>
        </div>

        <!-- Module tabs -->
        <template v-if="mod === 'settings'">
          <div class="flex items-center gap-1.5 ml-1">
            <span class="text-sm leading-none">⚙️</span>
            <span class="text-gray-300 font-medium text-xs hidden sm:inline">Einstellungen</span>
          </div>
        </template>
        <template v-else>
          <div v-if="ctxModules.length > 1" class="flex items-center gap-0.5 ml-1">
            <button v-for="m in ctxModules" :key="m.id" @click="mod = m.id"
              :class="mod === m.id ? 'bg-white/[.14] text-white shadow-sm shadow-black/10' : 'text-gray-400 hover:text-gray-200 hover:bg-white/[.07]'"
              class="flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11px] font-medium transition-all duration-150">
              <span class="text-xs">{{ m.icon }}</span><span class="hidden sm:inline">{{ m.label }}</span>
            </button>
          </div>
          <span v-else-if="ctx" class="text-gray-500 text-[11px] ml-1.5 hidden sm:block font-medium">{{ currentModule?.label || '' }}</span>
          <h2 v-if="!ctx" class="text-gray-300 font-medium text-xs ml-1">{{ currentModule?.label || '' }}</h2>
        </template>
      </div>

      <!-- Right cluster -->
      <div class="flex items-center gap-1 sm:gap-1.5">
        <!-- Role switch -->
        <button v-if="ctxOptions.length > 1" @click="mod = 'ctx'; ctx = null; window.history.pushState(null, '', '/app')"
          class="hidden sm:flex items-center gap-1.5 text-[12px] text-gray-300 hover:text-white rounded-md px-2.5 py-1.5 transition-all hover:bg-white/10 focus-visible:ring-2 focus-visible:ring-blue-400/60 focus-visible:outline-none"
          title="Rolle wechseln">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
          <span class="font-medium">Rolle</span>
        </button>
        <!-- Git sync (orgaAdmin only) -->
        <button v-if="isOrgaAdmin" @click="triggerSync" :title="syncStatus.text"
          class="hidden sm:flex items-center gap-1 text-[12px] rounded-md px-2 py-1.5 transition-all hover:bg-white/10 focus-visible:ring-2 focus-visible:ring-blue-400/60 focus-visible:outline-none"
          :class="syncing ? 'text-blue-400' : syncStatus.cls.includes('green') ? 'text-emerald-400' : syncStatus.cls.includes('red') ? 'text-red-400' : 'text-gray-300 hover:text-white'">
          <svg class="w-3.5 h-3.5 shrink-0" :class="syncing ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          <span class="font-medium">{{ syncStatus.label }}</span>
        </button>
        <!-- Demo badge -->
        <span v-if="demoMode" class="hidden sm:inline-flex items-center gap-1 text-[10px] font-semibold px-1.5 py-0.5 rounded-md bg-amber-500/20 text-amber-300 border border-amber-500/30" title="Demo-Modus">
          DEMO
        </span>

        <!-- Separator -->
        <div class="w-px h-5 bg-white/15 mx-0.5 hidden sm:block"></div>

        <!-- Avatar → settings -->
        <button @click="mod = 'settings'"
          class="flex items-center gap-2 px-1.5 py-1 rounded-lg transition-all hover:bg-white/10 group focus-visible:ring-2 focus-visible:ring-blue-400/60 focus-visible:outline-none"
          :class="mod === 'settings' ? 'bg-white/10' : ''">
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold select-none transition-all"
            :class="mod === 'settings'
              ? 'bg-blue-500/30 text-blue-300 ring-1.5 ring-blue-400/60'
              : 'bg-white/15 text-gray-200 group-hover:text-white group-hover:bg-white/20'">
            {{ user.vorname?.[0] || '' }}{{ user.name?.[0] || '' }}
          </div>
          <div class="text-right hidden sm:block">
            <div class="text-gray-200 text-[12px] font-medium leading-tight group-hover:text-white transition-colors">{{ user.vorname }} {{ user.name }}</div>
            <div class="text-gray-400 text-[10px] leading-tight font-mono">{{ user.kuerzel }}</div>
          </div>
        </button>
        <!-- Logout -->
        <button @click="logout"
          class="flex items-center gap-1 px-2 py-1.5 rounded-md text-gray-400 hover:text-red-400 hover:bg-red-500/15 transition-all focus-visible:ring-2 focus-visible:ring-red-400/60 focus-visible:outline-none"
          title="Abmelden">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </header>

    <!-- ─── Content ─── -->
    <main class="flex-1 overflow-y-auto bg-gray-50/80">

      <!-- ════════ KONTEXT-AUSWAHL ════════ -->
      <div v-if="mod === 'ctx'" class="min-h-full flex items-center justify-center p-6">
        <div class="w-full max-w-2xl">
          <div class="mb-10 text-center">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Willkommen, {{ user.vorname }}</h1>
            <p class="text-gray-500 mt-1.5 text-sm">In welchem Kontext möchten Sie arbeiten?</p>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <button v-for="opt in ctxOptions" :key="opt.type + (opt.chapterId||'') + (opt.sparteId||'')"
              @click="selectCtx(opt)"
              class="text-left bg-white rounded-xl border border-gray-200/80 p-5 hover:border-blue-300 hover:shadow-md hover:shadow-blue-500/5 transition-all duration-200 group focus:outline-none focus:ring-2 focus:ring-blue-400/40 focus:ring-offset-1">
              <div class="flex items-start gap-3.5">
                <span class="text-2xl mt-0.5 grayscale group-hover:grayscale-0 transition-all duration-200">{{ opt.icon }}</span>
                <div class="flex-1 min-w-0">
                  <div v-if="opt.role" class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-0.5">{{ opt.role }}</div>
                  <div class="font-semibold text-gray-800 group-hover:text-blue-600 transition-colors text-sm">{{ opt.label }}</div>
                  <div v-if="opt.detail" class="text-blue-600 text-[13px] font-semibold mt-0.5">{{ opt.detail }}</div>
                  <div class="text-gray-500 text-[12px] mt-1 leading-relaxed line-clamp-2">{{ opt.desc }}</div>
                </div>
                <svg class="w-4 h-4 text-gray-300 group-hover:text-blue-400 group-hover:translate-x-0.5 transition-all mt-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>
            </button>
            <!-- Technische Details (nur OrgaAdmin) -->
            <button v-if="isOrgaAdmin" @click="mod = 'sysinfo'"
              class="text-left bg-white/60 rounded-xl border border-dashed border-gray-200 p-5 hover:border-gray-300 hover:bg-white hover:shadow-sm transition-all duration-200 group focus:outline-none focus:ring-2 focus:ring-gray-400/30 focus:ring-offset-1">
              <div class="flex items-start gap-3.5">
                <span class="text-2xl mt-0.5 opacity-40 group-hover:opacity-70 transition-opacity">⚙️</span>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold text-gray-500 group-hover:text-gray-700 transition-colors text-sm">Technisch</div>
                  <div class="text-gray-400 text-[11px] mt-1 leading-relaxed">Server, Konfiguration, Datenbankstat.</div>
                </div>
                <svg class="w-4 h-4 text-gray-200 group-hover:text-gray-400 group-hover:translate-x-0.5 transition-all mt-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- ════════ MODULE COMPONENTS ════════ -->
      <dashboard-view   v-if="mod === 'dashboard'"  @navigate="mod = $event"></dashboard-view>
      <events-list      v-if="mod === 'events'"></events-list>
      <pruefe-wizard    v-if="mod === 'pruefe'"      :init-chapter-id="ctx?.chapterId || ''" :init-sparte-id="ctx?.sparteId || ''" @done="mod = 'ctx'"></pruefe-wizard>
      <member-manager   v-if="mod === 'members'"></member-manager>
      <chapter-manager  v-if="mod === 'chapters'"    @navigate="mod = $event"></chapter-manager>
      <orga-admin       v-if="mod === 'orga'"></orga-admin>
      <docs-viewer      v-if="mod === 'dokumente'"></docs-viewer>
      <user-settings    v-if="mod === 'settings'" @password-changed="mod = 'ctx'"></user-settings>
      <system-info      v-if="mod === 'sysinfo'" @back="mod = 'ctx'"></system-info>

    </main>
  </div>
</div>

<style>
  /* ── Form controls ── */
  .lbl     { display:block; font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .ctrl    { display:block; width:100%; padding:8px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; color:#1e293b; background:#fff; outline:none; box-sizing:border-box; transition:all .15s ease; }
  .ctrl:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
  .ctrl:disabled { background:#f8fafc; color:#94a3b8; cursor:not-allowed; }

  /* ── Buttons ── */
  .btn     { background:linear-gradient(180deg,#3b82f6,#2563eb); color:#fff; font-weight:600; padding:9px 20px; border-radius:8px; font-size:13px; cursor:pointer; border:none; transition:all .15s ease; box-shadow:0 1px 2px rgba(37,99,235,.25); }
  .btn:hover:not(:disabled)  { background:linear-gradient(180deg,#2563eb,#1d4ed8); box-shadow:0 2px 6px rgba(37,99,235,.3); transform:translateY(-0.5px); }
  .btn:active:not(:disabled) { transform:translateY(0); box-shadow:0 1px 2px rgba(37,99,235,.2); }
  .btn:disabled  { opacity:.45; cursor:not-allowed; }
  .btn-sm  { background:linear-gradient(180deg,#3b82f6,#2563eb); color:#fff; font-weight:500; padding:6px 14px; border-radius:7px; font-size:12px; cursor:pointer; border:none; transition:all .15s ease; box-shadow:0 1px 2px rgba(37,99,235,.2); }
  .btn-sm:hover:not(:disabled) { background:linear-gradient(180deg,#2563eb,#1d4ed8); box-shadow:0 2px 4px rgba(37,99,235,.25); }
  .btn-sm:disabled { opacity:.45; cursor:not-allowed; }
  .btn-sec { background:#f8fafc; color:#475569; font-weight:500; padding:6px 14px; border-radius:7px; font-size:12px; cursor:pointer; border:1px solid #e2e8f0; transition:all .15s ease; }
  .btn-sec:hover { background:#f1f5f9; border-color:#cbd5e1; }

  /* ── Table rows ── */
  .mb-row { border-left: 3px solid transparent; transition: all .12s ease; cursor: pointer; }
  .mb-row:hover { background: #f8fafc; }
  .mb-row-active { border-left-color: #3b82f6; background: #eff6ff; }
  .mb-chip-active { color: #16a34a; }
  .mb-chip-inactive { color: #94a3b8; }

  /* ── Validation badges ── */
  .val-ok { background: #dcfce7; color: #15803d; }
  .val-warn { background: #fef9c3; color: #a16207; }
  .val-other { background: #eff6ff; color: #2563eb; }
  .val-blocked { background: #fee2e2; color: #dc2626; }
  .val-none { background: #f1f5f9; color: #64748b; }
  .val-active { background: #dcfce7; color: #15803d; }
  .val-inactive { background: #f1f5f9; color: #64748b; }

  /* ── Navigation ── */
  .tab-active { background: rgba(255,255,255,0.12); color: #fff; }
  .tab-default { color: #64748b; }
  .tab-default:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }
  .avatar-ring { box-shadow: 0 0 0 2px #3b82f6; }
  .chevron-open { transform: rotate(180deg); }

  /* ── Stepper ── */
  .step-done { background: #22c55e; color: #fff; }
  .step-current { background: #2563eb; color: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,.2); }
  .step-pending { background: #e2e8f0; color: #64748b; }
  .step-pending:hover { background: #cbd5e1; }
  .step-label-current { color: #1d4ed8; font-weight: 600; }
  .step-label-default { color: #94a3b8; }
  .step-label-default:hover { color: #475569; }

  /* ── Dropzone ── */
  .drop-active { border-color: #3b82f6; background: #eff6ff; }
  .drop-idle { border-color: #e2e8f0; background: #f8fafc; }
  .drop-idle:hover { background: #f1f5f9; border-color: #cbd5e1; }

  /* ── Picker items ── */
  .pick-disabled { opacity: 0.35; pointer-events: none; background: #f8fafc; }
  .pick-highlight { background: #dbeafe; }
  .pick-highlight-green { background: #dcfce7; }

  /* ── Sparte cards ── */
  .sparte-active { background: #e0e7ff; border-color: #a5b4fc; }
  .sparte-idle { background: #f8fafc; border-color: #f1f5f9; }
  .sparte-idle:hover { background: #eef2ff; border-color: #c7d2fe; }

  /* ── Row states ── */
  .row-warn { background: #fefce8; }
  .row-error { background: #fef2f2; }

  /* ── Status badges ── */
  .status-offen { background: #fef3c7; color: #92400e; }
  .status-freigegeben { background: #d1fae5; color: #065f46; }
  .status-abgelehnt { background: #fee2e2; color: #991b1b; }
  .status-default { background: #f1f5f9; color: #64748b; }
  .row-passiv { opacity: 0.5; }

  /* ── Back button ── */
  .btn-back { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:7px; font-size:12px; font-weight:500; color:#64748b; background:transparent; border:1px solid #e2e8f0; cursor:pointer; transition:all .15s ease; }
  .btn-back:hover { background:#f8fafc; border-color:#cbd5e1; color:#334155; }
  .btn-back svg { width:14px; height:14px; }
</style>

<!-- Vendor -->
<script src="/vendor/vue.global.prod.js"></script>

<!-- Shared libraries -->
<script src="/lib/api-client.js"></script>

<!-- Components -->
<script src="/components/user-picker.js"></script>
<script src="/components/status-badge.js"></script>
<script src="/components/dashboard-view.js"></script>
<script src="/components/events-list.js"></script>
<script src="/components/pruefe-wizard.js"></script>
<script src="/components/member-manager.js"></script>
<script src="/components/chapter-manager.js"></script>
<script src="/components/orga-admin.js"></script>
<script src="/components/docs-viewer.js"></script>
<script src="/components/user-settings.js"></script>
<script src="/components/system-info.js"></script>

<script>
const { createApp, ref, reactive, computed, watch, onMounted, provide, nextTick } = Vue;

const app = createApp({
  setup() {
    // ── Auth guard ──
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search + window.location.hash); return {}; }

    const user = ref(JSON.parse(localStorage.getItem('user') || '{}'));
    const mustChange = new URLSearchParams(window.location.search).get('mustChange') === '1' || localStorage.getItem('mustChange') === '1';
    const i18n = MCM_I18N;
    const mod = ref(mustChange ? 'settings' : 'ctx');
    const ctx = ref(null);
    const userMenu = ref(false);
    const demoMode = ref(false);
    fetch('/api/status').then(r => r.json()).then(d => { demoMode.value = !!d.demoMode; }).catch(() => {});

    // ── Path-based routing ──
    function ctxPath(opt) {
      if (!opt) return '/app';
      if (opt.type === 'orgadmin')      return '/app/orgadmin';
      if (opt.type === 'zeitstelle')    return '/app/zeitstelle';
      if (opt.type === 'chapteradmin')  return '/app/chapteradmin/' + opt.chapterId;
      if (opt.type === 'spartenadmin')  return '/app/spartenadmin/' + opt.chapterId + '/' + opt.sparteId;
      return '/app/member';
    }

    // ── Role helpers ──
    const isOrgaAdmin = computed(() => !!user.value.orgaAdmin);
    const isZeitstelle = computed(() => !!user.value.zeitstelle);
    const isSuperadminAnywhere = computed(() => {
      if (isOrgaAdmin.value) return true;
      return Object.values(user.value.roles || {}).some(r => r === 'chapteradmin');
    });
    const hasAnyChapterRole = computed(() => Object.keys(user.value.roles || {}).length > 0);

    // ── Module definitions ──
    const allModules = [
      { id: 'dashboard',  icon: '📊', label: 'Dashboard' },
      { id: 'pruefe',     icon: '📋', label: 'Prüfe Veranstaltung' },
      { id: 'events',     icon: '📅', label: 'Veranstaltungen' },
      { id: 'members',    icon: '👥', label: 'Mitglieder',    need: 'orga' },
      { id: 'chapters',   icon: '🏢', label: 'Chapter',       need: 'super' },
      { id: 'orga',       icon: '🏛', label: 'Organisation',  need: 'orga' },
      { id: 'dokumente',  icon: '📂', label: 'Dokumente',     need: 'zeit' },
      { id: 'settings',   icon: '⚙️', label: 'Einstellungen' },
    ];
    const visibleModules = computed(() => allModules.filter(m => {
      if (m.separator) {
        if (m.need === 'zeit') return isZeitstelle.value || isOrgaAdmin.value;
        return true;
      }
      if (!m.need) return true;
      if (m.need === 'chapter')  return hasAnyChapterRole.value || isOrgaAdmin.value || isZeitstelle.value;
      if (m.need === 'super')    return isSuperadminAnywhere.value;
      if (m.need === 'orga')     return isOrgaAdmin.value;
      if (m.need === 'zeit')     return isZeitstelle.value || isOrgaAdmin.value;
      return true;
    }));
    const currentModule = computed(() => allModules.find(m => m.id === mod.value));

    // Per-context module tabs
    const ctxModules = computed(() => {
      if (!ctx.value) return [];
      const type = ctx.value.type;
      if (type === 'orgadmin')     return [{ id:'chapters', icon:'🏢', label:'Chapter' }];
      if (type === 'chapteradmin') return [{ id:'chapters', icon:'🏢', label:'Mein Chapter' }];
      if (type === 'spartenadmin') return [{ id:'pruefe', icon:'⏱', label:'Zeitkorrektur prüfen' }];
      if (type === 'zeitstelle')   return [{ id:'dokumente', icon:'📂', label:'Dokumente' }, { id:'events', icon:'📅', label:'Veranstaltungen' }];
      return [];
    });

    // Guard: if current mod not allowed in ctx, jump to first allowed
    watch([ctx, ctxModules], () => {
      if (!ctx.value || !ctxModules.value.length) return;
      if (mod.value === 'ctx' || mod.value === 'settings') return;
      if (!ctxModules.value.some(m => m.id === mod.value)) {
        mod.value = ctxModules.value[0].id;
      }
    });

    // ── API helpers ──
    const api = (url, opts = {}) => fetch(url, { ...opts, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) } });
    const apiPost = (url, body) => api(url, { method: 'POST', body: JSON.stringify(body) });
    const apiPut = (url, body) => api(url, { method: 'PUT', body: JSON.stringify(body) });

    // ── Git sync status ──
    const syncing = ref(false);
    const syncStatus = ref({ label: 'Sync', cls: 'text-gray-400', text: 'Manueller Sync' });
    async function triggerSync() {
      if (syncing.value) return;
      syncing.value = true;
      syncStatus.value = { label: 'Sync…', cls: 'text-blue-400', text: 'Synchronisiere…' };
      try {
        const r = await apiPost('/api/sync', {});
        const d = await r.json();
        if (d.pushed) syncStatus.value = { label: 'Sync ✓', cls: 'text-green-400', text: 'Gepusht' };
        else if (d.committed) syncStatus.value = { label: 'Sync ✓', cls: 'text-green-400', text: 'Committed' };
        else syncStatus.value = { label: 'Sync –', cls: 'text-gray-400', text: d.message || 'Keine Änderungen' };
      } catch { syncStatus.value = { label: 'Sync ✗', cls: 'text-red-400', text: 'Fehler' }; }
      syncing.value = false;
      setTimeout(() => { syncStatus.value = { label: 'Sync', cls: 'text-gray-400', text: 'Manueller Sync' }; }, 4000);
    }

    // ── Shared helpers ──
    function statusCls(s) {
      return { offen: 'status-offen', freigegeben: 'status-freigegeben', abgelehnt: 'status-abgelehnt' }[s] || 'status-default';
    }
    function isActive(ch) {
      const today = new Date().toISOString().slice(0, 10);
      if (!ch.eintrittsdatum || ch.eintrittsdatum > today) return false;
      if (ch.austrittsdatum && ch.austrittsdatum < today) return false;
      return true;
    }
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    // ── Shared data (needed by multiple components) ──
    const prChapters = ref([]);
    const org = ref(null);
    const userNameCache = reactive({});

    async function loadChapters() {
      try { const r = await api('/api/chapters'); prChapters.value = await r.json(); MCM_I18N.setChapters(prChapters.value); } catch {}
    }
    async function loadOrg() {
      try { const r = await api('/api/orga'); org.value = await r.json(); } catch {}
    }

    // ── User-picker helpers (shared via provide) ──
    let _uPickTimer = null;
    function uPickSearch(picker) {
      clearTimeout(_uPickTimer);
      if (picker.search.length < 2) { picker.results = []; picker.activeIdx = -1; return; }
      _uPickTimer = setTimeout(async () => {
        try { const r = await api(`/api/users/search?q=${encodeURIComponent(picker.search)}`); picker.results = await r.json(); picker.activeIdx = -1; } catch { picker.results = []; picker.activeIdx = -1; }
      }, 300);
    }
    function uPickAdd(picker, u) {
      if (!picker.list.includes(u.kuerzel)) picker.list.push(u.kuerzel);
      userNameCache[u.kuerzel] = `${u.vorname} ${u.name}`.trim();
      picker.search = ''; picker.results = []; picker.activeIdx = -1;
    }
    function uPickRemove(picker, kuerzel) { picker.list = picker.list.filter(k => k !== kuerzel); }
    function uPickKeydown(picker, e) {
      const res = picker.results;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        picker.activeIdx = res.length ? Math.min(picker.activeIdx + 1, res.length - 1) : -1;
        nextTick(() => { const container = e.target.closest('.relative')?.querySelector('[class*="overflow-y-auto"]'); container?.querySelector('.pick-highlight')?.scrollIntoView({ block: 'nearest' }); });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        picker.activeIdx = picker.activeIdx > 0 ? picker.activeIdx - 1 : 0;
        nextTick(() => { const container = e.target.closest('.relative')?.querySelector('[class*="overflow-y-auto"]'); container?.querySelector('.pick-highlight')?.scrollIntoView({ block: 'nearest' }); });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const idx = picker.activeIdx >= 0 ? picker.activeIdx : 0;
        const u = res[idx];
        if (u && !picker.list.includes(u.kuerzel)) uPickAdd(picker, u);
      } else if (e.key === 'Escape') {
        picker.results = []; picker.activeIdx = -1;
      }
    }

    // ── Provide shared state to all child components ──
    provide('api', api);
    provide('apiPost', apiPost);
    provide('apiPut', apiPut);
    provide('i18n', i18n);
    provide('user', user);
    provide('ctx', ctx);
    provide('prChapters', prChapters);
    provide('org', org);
    provide('statusCls', statusCls);
    provide('isActive', isActive);
    provide('isOrgaAdmin', isOrgaAdmin);
    provide('isZeitstelle', isZeitstelle);
    provide('isSuperadminAnywhere', isSuperadminAnywhere);
    provide('hasAnyChapterRole', hasAnyChapterRole);
    provide('userNameCache', userNameCache);
    provide('uPickSearch', uPickSearch);
    provide('uPickAdd', uPickAdd);
    provide('uPickRemove', uPickRemove);
    provide('uPickKeydown', uPickKeydown);

    // ── Module switching: load shared data ──
    watch(mod, (m) => {
      if (m === 'members' || m === 'pruefe') { if (!prChapters.value.length) loadChapters(); }
      if (m === 'orga') { loadOrg(); }
    });

    // ── Context (role picker) ──
    const ctxOptions = computed(() => {
      const opts = [];
      const roles = user.value.roles || {};
      if (isOrgaAdmin.value)
        opts.push({ type: 'orgadmin', label: 'Organisations-Admin', detail: null, icon: '🏛', desc: 'Chapters, Mitglieder, Anfragen und Organisation verwalten', color: 'rose' });
      if (isZeitstelle.value)
        opts.push({ type: 'zeitstelle', label: 'Zeitstelle', detail: null, icon: '⏱', desc: 'Freigabelisten und Dokumente verwalten', color: 'amber' });
      for (const [cid, role] of Object.entries(roles)) {
        if (role === 'chapteradmin')
          opts.push({ type: 'chapteradmin', chapterId: cid, label: 'Chapter-Admin', detail: i18n.chapter(cid), icon: '🏢', desc: 'Mitglieder verwalten, Eintritt und Austritt erfassen', color: 'purple' });
        else if (role?.role === 'spartenadmin' && role?.sparten?.length)
          for (const sp of role.sparten)
            opts.push({ type: 'spartenadmin', chapterId: cid, sparteId: sp, label: 'Spartenadmin', detail: `${i18n.sparte(sp)} · ${i18n.chapter(cid)}`, icon: '🏓', desc: 'Veranstaltungen prüfen und einreichen', color: 'blue' });
      }
      for (const sl of (user.value.spartenleiter || [])) {
        if (!opts.some(o => o.type === 'spartenadmin' && o.chapterId === sl.chapterId && o.sparteId === sl.sparteId))
          opts.push({ type: 'spartenadmin', chapterId: sl.chapterId, sparteId: sl.sparteId, role: 'Spartenleitung', label: 'Zeitkorrektur prüfen', detail: `${i18n.sparte(sl.sparteId)} · ${i18n.chapter(sl.chapterId)}`, icon: '⏱', desc: 'Freigabeliste erstellen und Zeitkorrektur einreichen', color: 'teal' });
      }
      if (opts.length === 0)
        opts.push({ type: 'member', label: 'Mitglied', detail: null, icon: '👤', desc: 'Konto und Einstellungen verwalten', color: 'gray' });
      return opts;
    });

    function selectCtx(opt, skipPush) {
      ctx.value = opt;
      if (opt.type === 'orgadmin')        mod.value = 'chapters';
      else if (opt.type === 'chapteradmin') mod.value = 'chapters';
      else if (opt.type === 'spartenadmin') mod.value = 'pruefe';
      else if (opt.type === 'zeitstelle')   mod.value = 'dokumente';
      else                                  mod.value = 'settings';
      if (!skipPush) window.history.pushState(null, '', ctxPath(opt));
    }

    function restoreCtxFromPath() {
      const segs = window.location.pathname.replace(/^\/app\/?/, '').split('/').filter(Boolean);
      if (!segs.length) return false;
      const type = segs[0];
      const opts = ctxOptions.value;
      let match = null;
      if (type === 'orgadmin')          match = opts.find(o => o.type === 'orgadmin');
      else if (type === 'zeitstelle')   match = opts.find(o => o.type === 'zeitstelle');
      else if (type === 'chapteradmin' && segs[1]) match = opts.find(o => o.type === 'chapteradmin' && o.chapterId === segs[1]);
      else if (type === 'spartenadmin' && segs[1] && segs[2]) match = opts.find(o => o.type === 'spartenadmin' && o.chapterId === segs[1] && o.sparteId === segs[2]);
      else if (type === 'member')       match = opts.find(o => o.type === 'member');
      if (match) { selectCtx(match, true); return true; }
      return false;
    }

    watch(ctxOptions, () => {
      if (mod.value !== 'ctx') return;
      restoreCtxFromPath();
    }, { immediate: true });

    // ── Browser back/forward navigation ──
    window.addEventListener('popstate', () => {
      if (!restoreCtxFromPath()) {
        mod.value = 'ctx';
        ctx.value = null;
      }
    });

    onMounted(() => { loadChapters(); loadOrg(); });

    return {
      user, i18n, mod, visibleModules, currentModule,
      isOrgaAdmin, isZeitstelle, isSuperadminAnywhere, hasAnyChapterRole,
      logout, statusCls, userMenu,
      ctx, ctxOptions, selectCtx, ctxPath, ctxModules,
      syncing, syncStatus, triggerSync,
      demoMode,
      branding: window.APP_BRANDING || {},
    };
  }
});

// Register all components
app.component('user-picker', UserPicker);
app.component('status-badge', StatusBadge);
app.component('dashboard-view', DashboardView);
app.component('events-list', EventsList);
app.component('pruefe-wizard', PruefeWizard);
app.component('member-manager', MemberManager);
app.component('chapter-manager', ChapterManager);
app.component('orga-admin', OrgaAdmin);
app.component('docs-viewer', DocsViewer);
app.component('user-settings', UserSettings);
app.component('system-info', SystemInfo);
app.mount('#app');
</script>
</body>
</html>
