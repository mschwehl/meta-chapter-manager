<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCM – Organisation</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="/vendor/tailwindcss-browser.js"></script>
  <script src="/store.js"></script>
  <script src="/i18n.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app">

  <nav class="bg-blue-700 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/dashboard.html" class="text-blue-200 hover:text-white text-sm">← Dashboard</a>
        <span class="text-blue-400">/</span>
        <span class="font-semibold">Organisation</span>
      </div>
      <span class="text-blue-200 text-sm">{{ user.vorname }} {{ user.name }}</span>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-8 space-y-6">

    <div v-if="loading" class="text-center text-gray-400 py-16">Laden …</div>

    <template v-else>

      <!-- Organisations-Card -->
      <div class="bg-white rounded-2xl shadow p-6">
        <div class="flex items-start justify-between mb-4">
          <div>
            <h1 class="text-xl font-bold text-gray-800">{{ org.name }}</h1>
            <span class="text-gray-400 text-sm font-mono">{{ org.id }}</span>
          </div>
          <button v-if="user.orgaAdmin" @click="editMode = !editMode"
            class="btn-secondary text-xs">{{ editMode ? 'Abbrechen' : 'Bearbeiten' }}</button>
        </div>

        <!-- Orga-Admins -->
        <div class="mb-4">
          <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Organisations-Admins</div>
          <div class="flex flex-wrap gap-2">
            <span v-for="k in (org.orgAdmins||[])" :key="k"
              class="px-3 py-1 bg-purple-50 text-purple-700 rounded-full text-xs font-mono">{{ k }}</span>
          </div>
        </div>

        <!-- Chapters Liste -->
        <div>
          <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Chapters</div>
          <div class="flex flex-wrap gap-2">
            <a v-for="ch in (org.chaptersDetail||[])" :key="ch.id"
              href="/chapters.html"
              class="px-3 py-1 bg-blue-50 text-blue-700 rounded-full text-sm font-medium hover:bg-blue-100 transition-colors">
              {{ ch.name }}
            </a>
          </div>
        </div>

        <!-- Bearbeitungsformular -->
        <form v-if="editMode" @submit.prevent="saveOrg" class="mt-6 border-t pt-5 space-y-4">
          <div>
            <label class="label">Organisations-Name</label>
            <input v-model="editForm.name" type="text" class="input" />
          </div>
          <div>
            <label class="label">Orga-Admins (Komma-getrennt)</label>
            <input v-model="editForm.orgaStr" type="text" class="input" placeholder="s888,x01" />
          </div>
          <div v-if="saveError" class="px-4 py-2 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{{ saveError }}</div>
          <div class="flex justify-end gap-3">
            <button type="button" @click="editMode = false" class="btn-secondary">Abbrechen</button>
            <button type="submit" :disabled="saving" class="btn-primary">{{ saving ? 'Speichern …' : 'Speichern' }}</button>
          </div>
        </form>
      </div>

      <!-- Statistik-Cards -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <div class="bg-white rounded-xl shadow p-5 text-center">
          <div class="text-3xl font-bold text-blue-700">{{ org.chapters?.length || 0 }}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wide">Chapters</div>
        </div>
        <div class="bg-white rounded-xl shadow p-5 text-center">
          <div class="text-3xl font-bold text-green-600">{{ totalSparten }}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wide">Sparten</div>
        </div>
        <div class="bg-white rounded-xl shadow p-5 text-center">
          <div class="text-3xl font-bold text-purple-600">{{ totalChapterAdmins }}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wide">Chapter-Admins</div>
        </div>
        <div class="bg-white rounded-xl shadow p-5 text-center">
          <div class="text-3xl font-bold text-orange-500">{{ (org.orgAdmins||[]).length }}</div>
          <div class="text-xs text-gray-500 mt-1 uppercase tracking-wide">Orga-Admins</div>
        </div>
      </div>

      <!-- Chapters Übersicht Tabelle -->
      <div class="bg-white rounded-2xl shadow overflow-x-auto">
        <div class="px-6 py-4 border-b">
          <h2 class="font-semibold text-gray-700">Chapters Übersicht</h2>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wide">
            <tr>
              <th class="px-5 py-3 text-left">ID</th>
              <th class="px-5 py-3 text-left">Name</th>
              <th class="px-5 py-3 text-left">Sparten</th>
              <th class="px-5 py-3 text-left">Chapter-Admins</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="ch in (org.chaptersDetail||[])" :key="ch.id" class="border-t hover:bg-gray-50">
              <td class="px-5 py-3 font-mono text-blue-700">{{ ch.id }}</td>
              <td class="px-5 py-3 font-medium">{{ ch.name }}</td>
              <td class="px-5 py-3 text-gray-500">{{ (ch.sparten||[]).map(s=>i18n.sparte(s)).join(', ') || '–' }}</td>
              <td class="px-5 py-3 text-gray-500 font-mono">{{ (ch.admins||[]).join(', ') || '–' }}</td>
            </tr>
          </tbody>
        </table>
      </div>

    </template>

  </main>

  <div v-if="toast.show" class="fixed bottom-6 right-6 px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium"
    :class="toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'">
    {{ toast.msg }}
  </div>

</div>

<style>
  .label { @apply block text-sm font-medium text-gray-600 mb-1; }
  .input { @apply w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500; }
  .btn-primary { @apply bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg hover:bg-blue-800 disabled:opacity-50 transition-colors text-sm; }
  .btn-secondary { @apply bg-gray-100 text-gray-700 font-medium px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors text-sm; }
</style>

<script src="/vendor/vue.global.prod.js"></script>
<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;
createApp({
  setup() {
    const token = MCM_STORE.get('token');
    const user = ref(JSON.parse(MCM_STORE.get('user') || '{}'));
    if (!token) window.location.href = '/login.html';
    const i18n = MCM_I18N;

    const org = ref({});
    const loading = ref(true);
    const editMode = ref(false);
    const saving = ref(false);
    const saveError = ref('');
    const editForm = reactive({ name: '', orgaStr: '' });
    const toast = reactive({ show: false, msg: '', type: 'success' });

    const totalSparten = computed(() => {
      const all = new Set();
      (org.value.chaptersDetail||[]).forEach(ch => (ch.sparten||[]).forEach(s => all.add(s)));
      return all.size;
    });

    const totalChapterAdmins = computed(() => {
      const all = new Set();
      (org.value.chaptersDetail||[]).forEach(ch => (ch.admins||[]).forEach(k => all.add(k)));
      return all.size;
    });

    function showToast(msg, type = 'success') {
      toast.msg = msg; toast.type = type; toast.show = true;
      setTimeout(() => toast.show = false, 3000);
    }

    async function apiFetch(url, opts = {}) {
      return fetch(url, {
        ...opts,
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
      });
    }

    async function load() {
      loading.value = true;
      const res = await apiFetch('/api/orga');
      org.value = await res.json();
      editForm.name = org.value.name || '';
      editForm.orgaStr = (org.value.orgAdmins || []).join(',');
      loading.value = false;
    }

    async function saveOrg() {
      saving.value = true; saveError.value = '';
      try {
        const payload = {
          name: editForm.name,
          orgAdmins: editForm.orgaStr.split(',').map(s=>s.trim()).filter(Boolean)
        };
        const res = await apiFetch('/api/orga', { method: 'PUT', body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error||'Fehler');
        editMode.value = false;
        showToast('Organisation gespeichert');
        await load();
      } catch(e) { saveError.value = e.message; }
      finally { saving.value = false; }
    }

    onMounted(load);
    return { user, i18n, org, loading, editMode, editForm, saving, saveError, toast, totalSparten, totalChapterAdmins, saveOrg };
  }
}).mount('#app');
</script>
</body>
</html>
