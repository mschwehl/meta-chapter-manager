name: Release

# Gitflow Release — triggered only by version tags (v*.*.*).
#
# Tag on main     →  full release,   Docker :latest + :1.2.3 + :1.2 + :1
# Tag on develop  →  pre-release,    Docker :1.2.3 only, no :latest
# Tag with -rc/-beta/-alpha → always pre-release regardless of branch

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: mschwehl/meta-chapter-manager
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ============================
  # STEP 1: Determine release type
  # ============================
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version:       ${{ steps.version.outputs.VERSION }}
      is_prerelease: ${{ steps.branchcheck.outputs.IS_PRERELEASE }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed to inspect which branch the tag is on

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check which branch this tag is on
        id: branchcheck
        run: |
          ON_MAIN=$(git branch -r --contains ${{ github.sha }} | grep -E '^\s*origin/(main|master)$' | head -1 || true)

          if [ -z "$ON_MAIN" ] || echo "${{ github.ref }}" | grep -qE '\-(rc|beta|alpha)'; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "→ PRE-RELEASE"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "→ FULL RELEASE"
          fi

  # ============================
  # STEP 2: Docker image
  # Full release  →  :latest + :1.2.3 + :1.2 + :1
  # Pre-release   →  :1.2.3-rc1 only  (no :latest)
  # ============================
  docker-release:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    env:
      APP_VERSION:   ${{ needs.prepare.outputs.version }}
      IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # semver tags always (full and pre-releases)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest only on full releases — never on pre-releases
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_prerelease == 'false' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================
  # STEP 3: GitHub Release
  # ============================
  github-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker-release
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
