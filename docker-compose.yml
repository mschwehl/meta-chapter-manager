services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Git database repository URL
      # file:// for local bare repo, https:// for remote (set GIT_SSL_VERIFY=false for self-signed)
      GIT_DB_URL: "${GIT_DB_URL:-}"
      GIT_DB_BRANCH: "${GIT_DB_BRANCH:-develop}"
      GIT_SSL_VERIFY: "${GIT_SSL_VERIFY:-true}"

      # Paths inside container
      DATA_DIR: /data
      DOCS_DIR: /docs

      # Security – JWT_SECRET is required; the server refuses to start without it.
      # Generate a strong value: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      JWT_SECRET: "${JWT_SECRET}"

      # CORS – leave empty for same-origin (production/OpenShift).
      # Set to '*' for local cross-origin dev/testing only.
      CORS_ORIGIN: "${CORS_ORIGIN:-}"
    volumes:
      # Persistent data volume (database working copy)
      - db-data:/data
      # Generated documents (DOCX etc.) - local, not in git
      - docs-data:/docs
    restart: unless-stopped

volumes:
  db-data:
  docs-data:
